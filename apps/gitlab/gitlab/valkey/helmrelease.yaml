---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab-valkey
  namespace: gitlab
spec:
  interval: 5m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: valkey
      version: 0.11.0
      sourceRef:
        kind: HelmRepository
        name: valkey
        namespace: flux-system
      interval: 5m
  values:
    image:
      repository: valkey/valkey
      tag: 7.2.12
    dataStorage:
      enabled: true
      requestedSize: 2Gi
