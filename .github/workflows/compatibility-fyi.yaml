---
name: compatibility.fyi gate

"on":
  push:
    branches:
      - "renovate/**"
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:

jobs:
  gate:
    permissions:
      contents: read
      statuses: write
    uses: compatibility-fyi/compatibility-gate/.github/workflows/gate.yml@226689de0e40e179e20242c2ff6629d303d97b6c # v1.0.3
    with:
      mode: ${{ github.event_name == 'push' && 'current' || 'all' }}
