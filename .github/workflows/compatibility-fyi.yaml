---
name: compatibility.fyi gate

"on":
  push:
    branches:
      - "renovate/**"
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:

jobs:
  gate:
    permissions:
      contents: read
      statuses: write
    uses: compatibility-fyi/compatibility-gate/.github/workflows/gate.yml@e2df2afaab8f3f959b2f1721b1180c1400b9665b # v1.0.1
    with:
      mode: ${{ github.event_name == 'push' && 'current' || 'all' }}
