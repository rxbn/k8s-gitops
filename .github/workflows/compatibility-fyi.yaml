---
name: compatibility.fyi gate

"on":
  push:
    branches:
      - "renovate/**"
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:

jobs:
  gate:
    permissions:
      contents: read
      statuses: write
    uses: compatibility-fyi/compatibility-gate/.github/workflows/gate.yml@1d1c452a96ba7ef8cd6c2d314fabad9dcad6f94c # v1.0.2
    with:
      mode: ${{ github.event_name == 'push' && 'current' || 'all' }}
