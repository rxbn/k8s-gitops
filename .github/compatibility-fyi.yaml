---
version: 1

defaults:
  unknown: block
  apiError: block
  minimumConfidence: high
  maximumEvidenceAgeDays: 180

gates:
  - id: cloudnativepg-postgresql
    project:
      id: cloudnativepg
      version:
        files:
          - crds/cloudnative-pg/crds.yaml
        document:
          apiVersion: source.toolkit.fluxcd.io/v1
          kind: GitRepository
          metadata.name: cloudnative-pg
        value: spec.ref.tag

    dependency:
      id: postgresql
      versions:
        files:
          - apps/**/postgres/*.yaml
        document:
          apiVersion: postgresql.cnpg.io/v1
          kind: Cluster
        value: spec.imageName
        extract: ":(?<version>[^@]+)$"

  - id: barman-cloud-cloudnativepg
    project:
      id: barman-cloud-plugin
      version:
        files:
          - crds/cnpg-plugin-barman-cloud/crds.yaml
        document:
          apiVersion: source.toolkit.fluxcd.io/v1
          kind: GitRepository
          metadata.name: cnpg-plugin-barman-cloud
        value: spec.ref.tag

    dependency:
      id: cloudnativepg
      versions:
        files:
          - crds/cloudnative-pg/crds.yaml
        document:
          apiVersion: source.toolkit.fluxcd.io/v1
          kind: GitRepository
          metadata.name: cloudnative-pg
        value: spec.ref.tag

  - id: keycloak-postgresql
    project:
      id: keycloak
      version:
        files:
          - apps/keycloak/keycloak/deployment.yaml
        document:
          apiVersion: apps/v1
          kind: Deployment
          metadata.name: keycloak
        value: spec.template.spec.containers.0.image
        extract: ":(?<version>[^@]+)$"

    dependency:
      id: postgresql
      versions:
        files:
          - apps/keycloak/postgres/cnpg-cluster.yaml
        document:
          apiVersion: postgresql.cnpg.io/v1
          kind: Cluster
          metadata.name: keycloak-postgres
        value: spec.imageName
        extract: ":(?<version>[^@]+)$"

  - id: teslamate-postgresql
    project:
      id: teslamate
      version:
        files:
          - apps/teslamate/teslamate/deployment.yaml
        document:
          apiVersion: apps/v1
          kind: Deployment
          metadata.name: teslamate
        value: spec.template.spec.containers.0.image
        extract: ":(?<version>[^@]+)$"

    dependency:
      id: postgresql
      versions:
        files:
          - apps/teslamate/postgres/cnpg-cluster.yaml
        document:
          apiVersion: postgresql.cnpg.io/v1
          kind: Cluster
          metadata.name: teslamate-postgres
        value: spec.imageName
        extract: ":(?<version>[^@]+)$"

  - id: gitlab-postgresql
    project:
      id: gitlab-helm
      version:
        files:
          - apps/gitlab/gitlab/gitlab/helmrelease.yaml
        document:
          apiVersion: helm.toolkit.fluxcd.io/v2
          kind: HelmRelease
          metadata.name: gitlab
        value: spec.chart.spec.version

    dependency:
      id: postgresql
      versions:
        files:
          - apps/gitlab/gitlab/postgres/cnpg-cluster.yaml
        document:
          apiVersion: postgresql.cnpg.io/v1
          kind: Cluster
          metadata.name: gitlab-postgres
        value: spec.imageName
        extract: ":(?<version>[^@]+)$"

  - id: gitlab-valkey
    project:
      id: gitlab-helm
      version:
        files:
          - apps/gitlab/gitlab/gitlab/helmrelease.yaml
        document:
          apiVersion: helm.toolkit.fluxcd.io/v2
          kind: HelmRelease
          metadata.name: gitlab
        value: spec.chart.spec.version

    dependency:
      id: valkey
      versions:
        files:
          - apps/gitlab/gitlab/valkey/helmrelease.yaml
        document:
          apiVersion: helm.toolkit.fluxcd.io/v2
          kind: HelmRelease
          metadata.name: gitlab-valkey
        value: spec.values.image.tag

  - id: gitlab-runner-gitlab
    project:
      id: gitlab-runner-helm
      version:
        files:
          - apps/gitlab/gitlab-runner/helmrelease.yaml
        document:
          apiVersion: helm.toolkit.fluxcd.io/v2
          kind: HelmRelease
          metadata.name: gitlab-runner
        value: spec.chart.spec.version

    dependency:
      id: gitlab-helm
      versions:
        files:
          - apps/gitlab/gitlab/gitlab/helmrelease.yaml
        document:
          apiVersion: helm.toolkit.fluxcd.io/v2
          kind: HelmRelease
          metadata.name: gitlab
        value: spec.chart.spec.version

  - id: envoy-gateway-api
    project:
      id: envoy-gateway
      version:
        files:
          - core/ocirepositories/envoy-gateway.yaml
        document:
          apiVersion: source.toolkit.fluxcd.io/v1
          kind: OCIRepository
          metadata.name: envoy-gateway
        value: spec.ref.tag

    dependency:
      id: gateway-api
      versions:
        files:
          - crds/envoy-gateway/kustomization.yaml
        document:
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
        value: resources.0
        extract: /download/v(?<version>[^/]+)/
